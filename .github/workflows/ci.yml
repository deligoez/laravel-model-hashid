name: CI

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - composer.json
      - phpstan.neon.dist
      - pint.json
      - rector.php
      - phpunit.xml.dist
      - .github/workflows/ci.yml
  pull_request:
    branches:
      - main
    paths:
      - '**.php'
      - composer.json
      - phpstan.neon.dist
      - pint.json
      - rector.php
      - phpunit.xml.dist
      - .github/workflows/ci.yml

jobs:
  # ──────────────────────────────────────────────
  # Tier 1: Lint (parallel) — fast code style checks
  # ──────────────────────────────────────────────
  pint:
    name: Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Check code style
        run: composer test:pint

  rector:
    name: Rector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Check Rector
        run: composer test:rector

  # ──────────────────────────────────────────────
  # Tier 2: Analysis & Tests (parallel, after lint)
  # ──────────────────────────────────────────────
  larastan:
    name: Larastan
    needs: [pint, rector]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Run Larastan
        run: composer test:phpstan

  pest-types:
    name: Pest Types
    needs: [pint, rector]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      - name: Execute type coverage
        run: composer test:types

  pest:
    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }}
    needs: [pint, rector]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        laravel: ['11', '12']
        stability: [prefer-lowest, prefer-stable]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress --with="illuminate/contracts:^${{ matrix.laravel }}"

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --colors=always --order-by=random --no-coverage
